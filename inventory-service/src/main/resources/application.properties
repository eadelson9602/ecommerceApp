spring.application.name=inventory-service
# Desde .env: INVENTORY_SERVER_PORT (por defecto 8081)
server.port=${INVENTORY_SERVER_PORT:8081}

# Datasource: desde .env INVENTORY_SPRING_DATASOURCE_* (por defecto local)
spring.datasource.url=${INVENTORY_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/inventory_db}
spring.datasource.username=${INVENTORY_SPRING_DATASOURCE_USERNAME:inventory}
spring.datasource.password=${INVENTORY_SPRING_DATASOURCE_PASSWORD:inventory}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Products Service (WebClient): desde .env INVENTORY_APP_PRODUCTS_SERVICE_*
app.products-service.url=${INVENTORY_APP_PRODUCTS_SERVICE_URL:http://localhost:8080}
app.products-service.api-key=${INVENTORY_APP_PRODUCTS_SERVICE_API_KEY:internal-api-key-change-in-prod}
app.products-service.timeout-ms=${INVENTORY_APP_PRODUCTS_SERVICE_TIMEOUT_MS:3000}

# Resilience4j
resilience4j.circuitbreaker.instances.products.slidingWindowSize=10
resilience4j.circuitbreaker.instances.products.failureRateThreshold=50
resilience4j.circuitbreaker.instances.products.waitDurationInOpenState=5s
resilience4j.retry.instances.products.maxAttempts=3
resilience4j.retry.instances.products.waitDuration=500ms

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# JWT y rate limit: desde .env (compartidas JWT_SECRET; opcional APP_RATE_LIMIT_*)
app.jwt.secret=${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-please-change-in-production}
app.rate-limit.max-requests-per-minute=${APP_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:100}

# OpenAPI - evita "Failed to load remote configuration"
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

logging.pattern.console=%d{ISO8601} [%X{correlationId:-}] %-5level %logger{36} - %msg%n
