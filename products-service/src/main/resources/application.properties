spring.application.name=products-service
server.port=8080

# Datasource (override with env in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/products_db
spring.datasource.username=products
spring.datasource.password=products
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# JSON:API
spring.web.converters.preferred-json-mapper=jackson

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Seguridad
app.internal.api-key=${INTERNAL_API_KEY:internal-api-key-change-in-prod}
app.jwt.secret=${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-please-change-in-production}
app.jwt.expiration-seconds=3600
app.rate-limit.max-requests-per-minute=100

# OpenAPI (springdoc) - evita "Failed to load remote configuration"
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
# Cargar la spec directamente desde esta URL (no usar swagger-config)
springdoc.swagger-ui.url=/v3/api-docs

# Logging (correlation-id en MDC)
logging.pattern.console=%d{ISO8601} [%X{correlationId:-}] %-5level %logger{36} - %msg%n
