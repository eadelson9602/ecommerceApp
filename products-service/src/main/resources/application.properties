spring.application.name=products-service
# Desde .env: PRODUCTS_SERVER_PORT (por defecto 8080)
server.port=${PRODUCTS_SERVER_PORT:8080}

# Datasource: desde .env PRODUCTS_SPRING_DATASOURCE_* (por defecto local)
spring.datasource.url=${PRODUCTS_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/products_db}
spring.datasource.username=${PRODUCTS_SPRING_DATASOURCE_USERNAME:products}
spring.datasource.password=${PRODUCTS_SPRING_DATASOURCE_PASSWORD:products}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
# Actualiza checksums en flyway_schema_history cuando un script ya aplicado fue modificado (p. ej. seed 500 productos)
spring.flyway.repair-on-migrate=true

# JSON:API
spring.web.converters.preferred-json-mapper=jackson

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Seguridad: desde .env (compartidas JWT_SECRET, INTERNAL_API_KEY; opcional APP_RATE_LIMIT_*, APP_JWT_EXPIRATION_SECONDS)
app.internal.api-key=${PRODUCTS_INTERNAL_API_KEY:internal-api-key-change-in-prod}
app.jwt.secret=${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-please-change-in-production}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
app.rate-limit.max-requests-per-minute=${APP_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:100}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OpenAPI (springdoc) - evita "Failed to load remote configuration"
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
# Cargar la spec directamente desde esta URL (no usar swagger-config)
springdoc.swagger-ui.url=/v3/api-docs

# Logging (correlation-id en MDC)
logging.pattern.console=%d{ISO8601} [%X{correlationId:-}] %-5level %logger{36} - %msg%n
