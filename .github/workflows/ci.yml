name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and verify coverage
        run: ./mvnw verify -B -pl products-service,inventory-service -am

      - name: Build JARs (no tests)
        run: ./mvnw package -B -pl products-service,inventory-service -am -DskipTests -q
