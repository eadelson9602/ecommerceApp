spring.application.name=inventory-service
server.port=8081

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5433/inventory_db
spring.datasource.username=inventory
spring.datasource.password=inventory
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Products Service (WebClient)
app.products-service.url=http://localhost:8080
app.products-service.api-key=internal-api-key-change-in-prod
app.products-service.timeout-ms=3000

# Resilience4j
resilience4j.circuitbreaker.instances.products.default.slidingWindowSize=10
resilience4j.circuitbreaker.instances.products.default.failureRateThreshold=50
resilience4j.circuitbreaker.instances.products.default.waitDurationInOpenState=5s
resilience4j.retry.instances.products.maxAttempts=3
resilience4j.retry.instances.products.waitDuration=500ms

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# JWT (mismo secret que products para validar tokens del frontend)
app.jwt.secret=${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-please-change-in-production}
app.rate-limit.max-requests-per-minute=100

# OpenAPI - evita "Failed to load remote configuration"
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

logging.pattern.console=%d{ISO8601} [%X{correlationId:-}] %-5level %logger{36} - %msg%n
